version: '3.8'

services:
  dokploy:
    image: my-dockly-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_UMAMI_HOST=${NEXT_PUBLIC_UMAMI_HOST}
      - NEXT_PUBLIC_UMAMI_WEBSITE_ID=${NEXT_PUBLIC_UMAMI_WEBSITE_ID}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - monitoring
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  api:
    image: my-dockly-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    ports:
      - "3002:3000"
    depends_on:
      - dokploy
    restart: unless-stopped

  schedules:
    image: my-dockly-schedules
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    ports:
      - "3003:3000"
    depends_on:
      - dokploy
    restart: unless-stopped

  monitoring:
    image: my-dockly-monitoring
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - ./monitoring-data:/app/data

networks:
  default:
    driver: bridge
